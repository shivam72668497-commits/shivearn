<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShivearnApp - Welcome</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    :root {
      --bg-gradient-start: #0f172a; /* Slate 900 */
      --bg-gradient-end: #1e1b4b;   /* Indigo 950 */
      --text-main: #f8fafc;         /* Slate 50 */
      --text-muted: #94a3b8;        /* Slate 400 */
      --accent: #10b981;            /* Emerald 500 */
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
    }

    body {
      background: linear-gradient(135deg, var(--bg-gradient-start), var(--bg-gradient-end));
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      color: var(--text-main);
      overflow: hidden;
    }

    /* Splash Screen Container */
    .splash-container {
      text-align: center;
      animation: fadeIn 0.6s ease-out;
      padding: 20px;
    }

    /* Logo Image Wrapper */
    .brand-logo-wrapper {
      margin-bottom: 16px;
      animation: pulseLogo 2s infinite ease-in-out;
    }

    .brand-logo-img {
      width: 80px;  /* Desktop sizing */
      height: 80px;
      object-fit: contain;
    }

    .brand-title {
      font-size: 2.5rem;
      font-weight: 700;
      background: linear-gradient(to right, #10b981, #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 8px;
    }

    .status-text {
      color: var(--text-main);
      font-size: 1rem;
      font-weight: 500;
      margin-bottom: 8px;
      letter-spacing: 0.5px;
    }

    .sub-status {
      color: var(--text-muted);
      font-size: 0.85rem;
      margin-bottom: 24px;
    }

    /* Premium Stream Loading Progress Bar */
    .loader-track {
      width: 200px;
      height: 4px;
      background: rgba(255, 255, 255, 0.08);
      border-radius: 2px;
      margin: 0 auto;
      overflow: hidden;
      position: relative;
    }

    .loader-bar {
      width: 60%;
      height: 100%;
      background: linear-gradient(to right, var(--accent), #3b82f6);
      border-radius: 2px;
      position: absolute;
      animation: loadingStream 1.4s infinite ease-in-out;
    }

    /* Keyframe Animations */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulseLogo {
      0%, 100% { transform: scale(1); opacity: 0.95; }
      50% { transform: scale(1.05); opacity: 1; }
    }

    @keyframes loadingStream {
      0% { left: -60%; }
      50% { left: 40%; width: 40%; }
      100% { left: 100%; }
    }

    /* Mobile Responsive Customization */
    @media (max-width: 480px) {
      .brand-logo-img {
        width: 70px;
        height: 70px;
      }
      .brand-title {
        font-size: 2.2rem;
      }
    }
  </style>
</head>
<body>

  <div class="splash-container">
    <div class="brand-logo-wrapper">
      <img src="assets/logo.png" alt="ShivearnApp Logo" class="brand-logo-img">
    </div>
    
    <h1 class="brand-title">ShivearnApp</h1>
    <p class="status-text">Securing connection...</p>
    <p class="sub-status">Verifying runtime synchronization tokens</p>
    
    <div class="loader-track">
      <div class="loader-bar"></div>
    </div>
  </div>

  <script>
    // Pure visual timeout operation to prevent script thread deadlock freezing
    window.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => {
        // Safe forwarding handoff to the specialized identity page layer
        window.location.href = "login.html";
      }, 2500); // 2.5 Seconds of elegant branding presentation
    });
  </script>
</body>
</html>
