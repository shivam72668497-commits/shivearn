<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ShivearnApp - Welcome</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  
  <style>
    <link rel="stylesheet" href="CSS/indexauth.css">
  </style>
  
</head>
<body>

  <div class="splash-container">
    <div class="brand-logo-wrapper">
      <img src="https://i.ibb.co/4Rpgpmz5/IMG-20260521-054250.png" alt="ShivearnApp Logo" class="brand-logo-img">
    </div>
    
    <h1 class="brand-title">ShivearnApp</h1>
    <p class="status-text">Securing connection...</p>
    <p class="sub-status">Verifying runtime synchronization tokens</p>
    
    <div class="loader-track">
      <div class="loader-bar"></div>
    </div>
  </div>

  <script>
    // Pure visual timeout operation to prevent script thread deadlock freezing
    window.addEventListener('DOMContentLoaded', () => {
      setTimeout(() => {
        // Safe forwarding handoff to the specialized identity page layer
        window.location.href = "login.html";
      }, 2500); // 2.5 Seconds of elegant branding presentation
    });
  </script>
</body>
</html>
