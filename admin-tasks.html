<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Manage Tasks - Admin</title>
  <!-- External CSS -->
  <link rel="stylesheet" href="css/admin-tasks.css">
</head>
<body>
  <!-- Header -->
  <header class="admin-header">
    <button class="back-btn" onclick="history.back()" aria-label="Go back">🔙</button>
    <h1>Manage Tasks</h1>
    <a href="profile.html" class="profile-btn" aria-label="Profile">👤</a>
  </header>

  <main class="admin-main">
    <!-- Loading state -->
    <div id="loading-state" class="loading-container hidden">
      <div class="spinner"></div>
      <p>Checking admin access...</p>
    </div>

    <!-- Admin panel (hidden until verified) -->
    <div id="admin-panel" class="hidden">
      <!-- Search bar -->
      <div class="search-bar">
        <input type="text" id="search-input" placeholder="Search tasks by ID or title...">
      </div>

      <!-- Task Form (Add/Edit) -->
      <section class="task-form-section">
        <h2 id="form-title">Add New Task</h2>
        <form id="task-form">
          <input type="hidden" id="form-mode" value="add"> <!-- add | edit -->
          <input type="hidden" id="edit-task-id" value="">

          <div class="form-group">
            <label for="task-id">Task ID*</label>
            <input type="text" id="task-id" required placeholder="e.g., watch_ad">
          </div>
          <div class="form-group">
            <label for="task-title">Title*</label>
            <input type="text" id="task-title" required placeholder="Watch an Ad">
          </div>
          <div class="form-group">
            <label for="task-desc">Description</label>
            <textarea id="task-desc" rows="2" placeholder="Earn coins by watching a short video"></textarea>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label for="task-reward">Reward Coins*</label>
              <input type="number" id="task-reward" min="0" required value="10">
            </div>
            <div class="form-group">
              <label for="task-type">Task Type</label>
              <select id="task-type">
                <option value="daily">Daily</option>
                <option value="one_time">One Time</option>
                <option value="special">Special</option>
              </select>
            </div>
          </div>
          <div class="form-group">
            <label for="task-icon">Icon (emoji)</label>
            <input type="text" id="task-icon" placeholder="📺">
          </div>
          <div class="form-group">
            <label>
              <input type="checkbox" id="task-status" checked> Enabled
            </label>
          </div>
          <div class="form-actions">
            <button type="submit" id="submit-btn" class="btn-primary">Add Task</button>
            <button type="button" id="cancel-edit-btn" class="btn-secondary hidden">Cancel Edit</button>
          </div>
        </form>
      </section>

      <!-- Tasks List -->
      <section class="tasks-list-section">
        <h2>Existing Tasks</h2>
        <div id="tasks-list-container" class="tasks-list">
          <!-- Dynamically populated -->
        </div>
      </section>
    </div>

    <!-- Toast notification -->
    <div id="toast" class="toast hidden"></div>

    <!-- Delete Confirmation Modal -->
    <div id="delete-modal" class="modal hidden">
      <div class="modal-content">
        <p>Are you sure you want to delete this task?</p>
        <div class="modal-actions">
          <button id="confirm-delete-btn" class="btn-danger">Delete</button>
          <button id="cancel-delete-btn" class="btn-secondary">Cancel</button>
        </div>
      </div>
    </div>
  </main>

  <!-- Firebase Integration (inline module) -->
  <script type="module">
    // ---------- Firebase SDK Imports ----------
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getDatabase, ref, onValue, get, set, update, remove, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    // ---------- Firebase Config ----------
    const firebaseConfig = {
      apiKey: "AIzaSyDYdTJdXbxZ4bUGW-wO1BRaszEUb2Q_BAg",
      authDomain: "shivearnapp.firebaseapp.com",
      databaseURL: "https://shivearnapp-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "shivearnapp",
      storageBucket: "shivearnapp.firebasestorage.app",
      messagingSenderId: "467728812929",
      appId: "1:467728812929:web:a73f12827309d9c09d7680"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    // ---------- DOM Elements ----------
    const loadingState = document.getElementById('loading-state');
    const adminPanel = document.getElementById('admin-panel');
    const taskForm = document.getElementById('task-form');
    const formMode = document.getElementById('form-mode');
    const editTaskId = document.getElementById('edit-task-id');
    const formTitle = document.getElementById('form-title');
    const taskIdInput = document.getElementById('task-id');
    const taskTitleInput = document.getElementById('task-title');
    const taskDescInput = document.getElementById('task-desc');
    const taskRewardInput = document.getElementById('task-reward');
    const taskTypeInput = document.getElementById('task-type');
    const taskIconInput = document.getElementById('task-icon');
    const taskStatusCheckbox = document.getElementById('task-status');
    const submitBtn = document.getElementById('submit-btn');
    const cancelEditBtn = document.getElementById('cancel-edit-btn');
    const tasksListContainer = document.getElementById('tasks-list-container');
    const searchInput = document.getElementById('search-input');
    const toast = document.getElementById('toast');
    const deleteModal = document.getElementById('delete-modal');
    const confirmDeleteBtn = document.getElementById('confirm-delete-btn');
    const cancelDeleteBtn = document.getElementById('cancel-delete-btn');

    let currentUser = null;
    let allTasks = {}; // cached tasks for search
    let taskToDelete = null;

    // ---------- Toast Notification ----------
    function showToast(message, type = 'success') {
      toast.textContent = message;
      toast.className = `toast ${type}`;
      void toast.offsetWidth;
      toast.classList.add('show');
      clearTimeout(toast.hideTimeout);
      toast.hideTimeout = setTimeout(() => {
        toast.classList.remove('show');
      }, 3000);
    }

    // ---------- Auth & Admin Check ----------
    auth.onAuthStateChanged(async (user) => {
      if (user) {
        currentUser = user;
        // Check if user is admin
        const adminRef = ref(db, `admins/${user.uid}`);
        try {
          const snapshot = await get(adminRef);
          if (snapshot.exists() && snapshot.val() === true) {
            // User is admin → show panel
            loadingState.classList.add('hidden');
            adminPanel.classList.remove('hidden');
            // Load tasks live
            listenToTasks();
          } else {
            // Not admin → redirect
            window.location.href = 'index.html';
          }
        } catch (err) {
          console.error('Admin check error:', err);
          showToast('Failed to verify admin status.', 'error');
          setTimeout(() => window.location.href = 'index.html', 2000);
        }
      } else {
        // No user → redirect
        window.location.href = 'index.html';
      }
    });

    // ---------- Realtime Tasks Listener ----------
    function listenToTasks() {
      const tasksRef = ref(db, 'tasks');
      onValue(tasksRef, (snapshot) => {
        allTasks = snapshot.val() || {};
        renderTaskList();
      });
    }

    // ---------- Render Task Cards ----------
    function renderTaskList() {
      const searchTerm = searchInput.value.toLowerCase().trim();
      const filteredTasks = Object.entries(allTasks).filter(([id, task]) => {
        if (!searchTerm) return true;
        return id.toLowerCase().includes(searchTerm) ||
               (task.title && task.title.toLowerCase().includes(searchTerm));
      });

      if (filteredTasks.length === 0) {
        tasksListContainer.innerHTML = '<p class="no-tasks">No tasks found.</p>';
        return;
      }

      let html = '';
      filteredTasks.forEach(([id, task]) => {
        const statusClass = task.status === false ? 'disabled' : 'enabled';
        html += `
          <div class="task-card-admin" data-task-id="${id}">
            <div class="task-info-admin">
              <span class="task-icon-admin">${task.icon || '❓'}</span>
              <div>
                <strong>${escapeHTML(task.title || 'No title')}</strong>
                <span class="task-id-label">(${id})</span>
                <p class="task-desc-admin">${escapeHTML(task.description || '')}</p>
                <small>Reward: ${task.reward || 0} 🪙 | Type: ${task.type || 'daily'}</small>
                <span class="status-badge ${statusClass}">${task.status !== false ? 'Enabled' : 'Disabled'}</span>
              </div>
            </div>
            <div class="task-actions-admin">
              <button class="btn-icon edit-task" data-id="${id}" title="Edit">✏️</button>
              <button class="btn-icon toggle-status" data-id="${id}" data-status="${task.status !== false}" title="Toggle status">${task.status !== false ? '⏸️' : '▶️'}</button>
              <button class="btn-icon delete-task" data-id="${id}" title="Delete">🗑️</button>
            </div>
          </div>
        `;
      });
      tasksListContainer.innerHTML = html;

      // Attach event listeners to dynamic buttons
      document.querySelectorAll('.edit-task').forEach(btn => {
        btn.addEventListener('click', () => editTask(btn.dataset.id));
      });
      document.querySelectorAll('.toggle-status').forEach(btn => {
        btn.addEventListener('click', () => toggleTaskStatus(btn.dataset.id, btn.dataset.status === 'true'));
      });
      document.querySelectorAll('.delete-task').forEach(btn => {
        btn.addEventListener('click', () => confirmDeleteTask(btn.dataset.id));
      });
    }

    // ---------- Search input event ----------
    searchInput.addEventListener('input', renderTaskList);

    // ---------- Form Submit (Add / Edit) ----------
    taskForm.addEventListener('submit', async (e) => {
      e.preventDefault();

      const mode = formMode.value; // "add" or "edit"
      const taskId = (mode === 'add') ? taskIdInput.value.trim() : editTaskId.value;
      if (!taskId) {
        showToast('Task ID is required.', 'error');
        return;
      }

      // Prevent duplicate IDs only when adding
      if (mode === 'add' && allTasks[taskId]) {
        showToast('A task with this ID already exists!', 'error');
        return;
      }

      const taskData = {
        title: taskTitleInput.value.trim(),
        description: taskDescInput.value.trim(),
        reward: parseInt(taskRewardInput.value) || 0,
        type: taskTypeInput.value,
        icon: taskIconInput.value.trim() || '❓',
        status: taskStatusCheckbox.checked,
        updatedAt: serverTimestamp()
      };

      try {
        if (mode === 'add') {
          // Add creation timestamp
          taskData.createdAt = serverTimestamp();
          await set(ref(db, `tasks/${taskId}`), taskData);
          showToast('Task added successfully!', 'success');
        } else {
          // Edit existing task – do not overwrite createdAt
          await update(ref(db, `tasks/${taskId}`), taskData);
          showToast('Task updated successfully!', 'success');
        }
        resetForm();
      } catch (error) {
        console.error('Save error:', error);
        showToast('Error saving task. Please try again.', 'error');
      }
    });

    // ---------- Edit Task ----------
    function editTask(taskId) {
      const task = allTasks[taskId];
      if (!task) return;

      formMode.value = 'edit';
      editTaskId.value = taskId;
      taskIdInput.value = taskId;
      taskIdInput.disabled = true; // prevent changing ID on edit
      taskTitleInput.value = task.title || '';
      taskDescInput.value = task.description || '';
      taskRewardInput.value = task.reward || 0;
      taskTypeInput.value = task.type || 'daily';
      taskIconInput.value = task.icon || '';
      taskStatusCheckbox.checked = task.status !== false;
      formTitle.textContent = 'Edit Task';
      submitBtn.textContent = 'Update Task';
      cancelEditBtn.classList.remove('hidden');
    }

    // ---------- Cancel Edit ----------
    cancelEditBtn.addEventListener('click', resetForm);

    function resetForm() {
      formMode.value = 'add';
      editTaskId.value = '';
      taskIdInput.value = '';
      taskIdInput.disabled = false;
      taskTitleInput.value = '';
      taskDescInput.value = '';
      taskRewardInput.value = 10;
      taskTypeInput.value = 'daily';
      taskIconInput.value = '';
      taskStatusCheckbox.checked = true;
      formTitle.textContent = 'Add New Task';
      submitBtn.textContent = 'Add Task';
      cancelEditBtn.classList.add('hidden');
    }

    // ---------- Toggle Task Status ----------
    async function toggleTaskStatus(taskId, currentStatus) {
      try {
        await update(ref(db, `tasks/${taskId}`), {
          status: !currentStatus,
          updatedAt: serverTimestamp()
        });
        showToast(`Task ${!currentStatus ? 'enabled' : 'disabled'} successfully.`, 'success');
      } catch (error) {
        console.error('Toggle error:', error);
        showToast('Error toggling status.', 'error');
      }
    }

    // ---------- Delete Task (with confirmation) ----------
    function confirmDeleteTask(taskId) {
      taskToDelete = taskId;
      deleteModal.classList.remove('hidden');
    }

    confirmDeleteBtn.addEventListener('click', async () => {
      if (!taskToDelete) return;
      try {
        await remove(ref(db, `tasks/${taskToDelete}`));
        showToast('Task deleted.', 'success');
        deleteModal.classList.add('hidden');
        taskToDelete = null;
      } catch (error) {
        console.error('Delete error:', error);
        showToast('Error deleting task.', 'error');
        deleteModal.classList.add('hidden');
      }
    });

    cancelDeleteBtn.addEventListener('click', () => {
      deleteModal.classList.add('hidden');
      taskToDelete = null;
    });

    // Close modal when clicking outside content
    deleteModal.addEventListener('click', (e) => {
      if (e.target === deleteModal) {
        deleteModal.classList.add('hidden');
        taskToDelete = null;
      }
    });

    // ---------- Escape HTML helper ----------
    function escapeHTML(str) {
      const div = document.createElement('div');
      div.appendChild(document.createTextNode(str));
      return div.innerHTML;
    }
  </script>
</body>
</html>
