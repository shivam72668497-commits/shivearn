<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Tasks</title>
  <!-- Link to external CSS (keep as separate file) -->
  <link rel="stylesheet" href="css/tasks.css">
</head>
<body>
  <!-- Header -->
  <header class="tasks-header">
    <button class="back-btn" onclick="history.back()" aria-label="Go back">🔙</button>
    <h1>Tasks</h1>
    <a href="profile.html" class="profile-btn" aria-label="Profile">👤</a>
  </header>

  <main class="tasks-main">
    <!-- Loading state -->
    <div id="loading-state" class="loading-container">
      <div class="spinner"></div>
      <p>Loading tasks...</p>
    </div>

    <!-- Empty state -->
    <div id="empty-state" class="empty-state hidden">
      <div class="empty-icon">📋</div>
      <p>No tasks available right now.</p>
      <p>Check back later!</p>
    </div>

    <!-- Daily tasks section -->
    <section id="tasks-section" class="hidden">
      <h2 class="section-title">Daily Tasks</h2>
      <div id="tasks-container" class="tasks-grid"></div>
    </section>

    <!-- Toast notification -->
    <div id="toast" class="toast hidden"></div>
  </main>

  <!-- Firebase integration – everything inline -->
  <script type="module">
    // ---------- 1. Import Firebase SDKs (no external config file) ----------
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getAuth } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import { getDatabase } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";
    import {
      ref,
      onValue,
      get,
      child,
      runTransaction,
      serverTimestamp
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    // ---------- 2. Firebase config (inlined) ----------
    const firebaseConfig = {
      apiKey: "AIzaSyDYdTJdXbxZ4bUGW-wO1BRaszEUb2Q_BAg",
      authDomain: "shivearnapp.firebaseapp.com",
      databaseURL: "https://shivearnapp-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "shivearnapp",
      storageBucket: "shivearnapp.firebasestorage.app",
      messagingSenderId: "467728812929",
      appId: "1:467728812929:web:a73f12827309d9c09d7680"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const database = getDatabase(app);

    // ---------- DOM references ----------
    const loadingState = document.getElementById('loading-state');
    const emptyState = document.getElementById('empty-state');
    const tasksSection = document.getElementById('tasks-section');
    const tasksContainer = document.getElementById('tasks-container');
    const toast = document.getElementById('toast');

    let currentUser = null;
    let userTasksRef = null;
    let userTasksListener = null;
    let tasksData = [];

    // ---------- Toast System ----------
    function showToast(message, type = 'success') {
      toast.textContent = message;
      toast.className = `toast ${type}`;
      void toast.offsetWidth;
      toast.classList.add('show');
      clearTimeout(toast.hideTimeout);
      toast.hideTimeout = setTimeout(() => {
        toast.classList.remove('show');
      }, 3000);
    }

    // ---------- Auth Listener ----------
    auth.onAuthStateChanged(user => {
      if (user) {
        currentUser = user;
        userTasksRef = ref(database, `users/${user.uid}/tasks`);
        loadTasks();
      } else {
        window.location.href = 'login.html'; // redirect if not logged in
      }
    });

    // ---------- Fetch Tasks from DB ----------
    async function loadTasks() {
      showLoading(true);
      const tasksRef = ref(database, 'tasks');
      try {
        const snapshot = await get(tasksRef);
        if (snapshot.exists()) {
          const val = snapshot.val();
          tasksData = Object.keys(val).map(key => ({
            id: key,
            ...val[key]
          }));
        } else {
          tasksData = [];
        }
        listenToUserTasks();
      } catch (error) {
        console.error('Error loading tasks:', error);
        showToast('Failed to load tasks. Please try again.', 'error');
        showLoading(false);
        showEmptyState();
      }
    }

    // ---------- Real-time listener for user progress ----------
    function listenToUserTasks() {
      if (userTasksListener) {
        onValue(userTasksRef, null); // unsubscribe
      }
      userTasksListener = onValue(userTasksRef, (snapshot) => {
        const userTasks = snapshot.val() || {};
        renderTasks(userTasks);
        showLoading(false);
      });
    }

    // ---------- Render all task cards ----------
    function renderTasks(userTasks) {
      if (tasksData.length === 0) {
        showEmptyState();
        return;
      }
      emptyState.classList.add('hidden');
      loadingState.classList.add('hidden');
      tasksSection.classList.remove('hidden');

      tasksContainer.innerHTML = '';
      tasksData.forEach(task => {
        const userTask = userTasks[task.id] || null;
        const completed = !!(userTask && userTask.completed === true);
        const card = createTaskCard(task, completed);
        tasksContainer.appendChild(card);
      });
    }

    // ---------- Build a task card ----------
    function createTaskCard(task, completed) {
      const card = document.createElement('div');
      card.className = 'task-card';
      card.dataset.taskId = task.id;

      const icon = getTaskIcon(task.id);

      card.innerHTML = `
        <div class="task-icon">${icon}</div>
        <div class="task-info">
          <h3 class="task-title">${escapeHTML(task.title || 'Untitled Task')}</h3>
          <p class="task-desc">${escapeHTML(task.description || '')}</p>
          <div class="task-reward">
            <span class="reward-icon">🪙</span>
            <span class="reward-amount">+${task.reward || 0}</span>
          </div>
          <div class="task-footer">
            <span class="status-badge ${completed ? 'completed' : 'pending'}">
              ${completed ? 'Completed' : 'Pending'}
            </span>
            <button class="complete-btn ${completed ? 'disabled' : ''}" 
              ${completed ? 'disabled' : ''} 
              data-task-id="${task.id}" 
              data-reward="${task.reward || 0}">
              ${completed ? 'Done' : 'Complete'}
            </button>
          </div>
        </div>
      `;

      if (!completed) {
        card.querySelector('.complete-btn').addEventListener('click', handleCompleteTask);
      }

      return card;
    }

    function escapeHTML(str) {
      const div = document.createElement('div');
      div.appendChild(document.createTextNode(str));
      return div.innerHTML;
    }

    function getTaskIcon(taskId) {
      const icons = {
        'watch_ad': '📺',
        'join_telegram': '✈️',
        'follow_instagram': '📸',
        'refer_friend': '👥',
        'login_bonus': '🎁'
      };
      return icons[taskId] || '✅';
    }

    // ---------- Secure task completion (atomic transaction) ----------
    async function handleCompleteTask(e) {
      const btn = e.target;
      const taskId = btn.dataset.taskId;
      const reward = parseInt(btn.dataset.reward) || 0;

      if (!currentUser) {
        showToast('You must be logged in.', 'error');
        return;
      }

      btn.disabled = true;
      btn.classList.add('loading');
      btn.textContent = 'Claiming...';

      const taskRef = child(userTasksRef, taskId);

      // Step 1: Mark task completed only if not already done
      runTransaction(taskRef, (currentData) => {
        if (currentData && currentData.completed === true) {
          return; // abort – already completed
        }
        return {
          completed: true,
          timestamp: serverTimestamp()
        };
      })
      .then((result) => {
        if (!result.committed) {
          showToast('Task already completed!', 'info');
          resetButton(btn, 'Done');
          return;
        }

        // Step 2: Add reward coins securely
        const coinsRef = ref(database, `users/${currentUser.uid}/coins`);
        return runTransaction(coinsRef, (currentCoins) => {
          return (currentCoins || 0) + reward;
        });
      })
      .then((coinResult) => {
        if (coinResult && !coinResult.committed) {
          showToast('Task completed, but coin credit failed. Contact support.', 'error');
        } else if (coinResult && coinResult.committed) {
          showToast(`Task completed! +${reward} coins earned!`, 'success');
        }
        // UI updates automatically via the listener
      })
      .catch((error) => {
        console.error('Transaction error:', error);
        showToast('Error completing task. Please try again.', 'error');
        resetButton(btn, 'Complete');
      });
    }

    function resetButton(btn, text) {
      btn.disabled = false;
      btn.classList.remove('loading');
      btn.textContent = text;
    }

    // ---------- UI state helpers ----------
    function showLoading(isLoading) {
      loadingState.classList.toggle('hidden', !isLoading);
      emptyState.classList.add('hidden');
      tasksSection.classList.add('hidden');
    }

    function showEmptyState() {
      loadingState.classList.add('hidden');
      tasksSection.classList.add('hidden');
      emptyState.classList.remove('hidden');
    }
  </script>
</body>
</html>
