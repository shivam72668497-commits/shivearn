<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>ShivearnApp | Splash</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'Inter',sans-serif;min-height:100vh;background:radial-gradient(circle at 20% 30%,#0a0f1e,#03050b);display:flex;align-items:center;justify-content:center;padding:1.5rem;}
    .glass-card{background:rgba(18,25,40,0.55);backdrop-filter:blur(16px);border-radius:2.5rem;border:1px solid rgba(255,255,255,0.2);box-shadow:0 25px 45px rgba(0,0,0,0.4),0 0 0 0.5px rgba(255,255,255,0.1) inset;transition:all 0.3s ease;}
    .splash-container{max-width:480px;width:100%;padding:2.2rem 2rem 2rem 2rem;text-align:center;animation:fadeScale 0.6s cubic-bezier(0.2,0.9,0.4,1.1);}
    @keyframes fadeScale{0%{opacity:0;transform:scale(0.96);}100%{opacity:1;transform:scale(1);}}
    .logo-area{margin-bottom:1.5rem;}
    .logo-img{width:95px;height:95px;object-fit:contain;margin-bottom:0.75rem;filter:drop-shadow(0 8px 20px rgba(0,0,0,0.3));}
    .app-name{font-size:2rem;font-weight:700;background:linear-gradient(135deg,#FFFFFF,#B9C8FF);-webkit-background-clip:text;background-clip:text;color:transparent;letter-spacing:-0.3px;margin-bottom:0.3rem;}
    .tagline{font-size:0.9rem;font-weight:500;color:#a7b6e0;background:rgba(255,255,255,0.05);display:inline-block;padding:0.3rem 1rem;border-radius:60px;letter-spacing:0.3px;}
    .loading-section{margin:2rem 0 1.8rem;}
    .percentage{font-size:3rem;font-weight:700;background:linear-gradient(145deg,#E0E9FF,#FFFFFF);-webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:0.5rem;font-variant-numeric:tabular-nums;}
    .progress-track{background:rgba(255,255,255,0.15);border-radius:60px;height:8px;width:100%;overflow:hidden;margin:0.9rem 0;box-shadow:inset 0 1px 3px rgba(0,0,0,0.3);}
    .progress-fill{width:0%;height:100%;background:linear-gradient(90deg,#4f9eff,#9f7aff);border-radius:60px;transition:width 0.08s linear;box-shadow:0 0 6px #6b8cff;}
    .loading-text{font-size:0.8rem;font-weight:500;color:#98abe8;letter-spacing:0.5px;}
    .support-area{margin-top:2rem;padding-top:1.2rem;border-top:1px solid rgba(255,255,255,0.15);display:flex;flex-direction:column;gap:0.7rem;}
    .support-title{font-size:0.75rem;text-transform:uppercase;letter-spacing:1.5px;font-weight:600;color:#8f9ed4;}
    .support-links{display:flex;justify-content:center;gap:1.8rem;flex-wrap:wrap;}
    .support-item{display:flex;align-items:center;gap:0.6rem;font-size:0.85rem;font-weight:500;background:rgba(255,255,255,0.05);padding:0.45rem 1rem;border-radius:80px;backdrop-filter:blur(4px);transition:0.2s;color:#cdd9ff;text-decoration:none;}
    .support-item i{font-size:1rem;color:#6c9eff;}
    .support-item:hover{background:rgba(255,255,255,0.12);transform:translateY(-2px);color:white;}
    .credits{margin-top:1.2rem;font-size:0.7rem;color:#5f6f9a;}
    @media (max-width:480px){.splash-container{padding:1.8rem 1.4rem;}.app-name{font-size:1.7rem;}.logo-img{width:75px;height:75px;}.percentage{font-size:2.5rem;}}
  </style>
</head>
<body>
<div class="glass-card splash-container">
  <div class="logo-area">
    <img src="https://i.ibb.co/4Rpgpmz5/IMG-20260521-054250.png" alt="ShivearnApp Logo" class="logo-img">
    <div class="app-name">ShivearnApp</div>
    <div class="tagline">Smart Tasks • Real Rewards</div>
  </div>
  <div class="loading-section">
    <div class="percentage" id="loadingPercent">0%</div>
    <div class="progress-track">
      <div class="progress-fill" id="progressFill"></div>
    </div>
    <div class="loading-text"><i class="fas fa-spinner fa-pulse" style="margin-right:6px;"></i> Securing experience...</div>
  </div>
  <div class="support-area">
    <div class="support-title">⚡ 24/7 Customer Support</div>
    <div class="support-links">
      <a href="mailto:shivamcoamp@gmail.com" class="support-item"><i class="fas fa-envelope"></i> shivamcoamp@gmail.com</a>
      <a href="https://t.me/ShivamRajbhars" target="_blank" class="support-item"><i class="fab fa-telegram-plane"></i> @ShivamRajbhars</a>
    </div>
  </div>
  <div class="credits"><i class="fas fa-shield-alt"></i> Secure • Permanent Session</div>
</div>
<script type="importmap">
  {
    "imports": {
      "firebase/app": "https://www.gstatic.com/firebasejs/10.13.2/firebase-app.js",
      "firebase/auth": "https://www.gstatic.com/firebasejs/10.13.2/firebase-auth.js"
    }
  }
</script>
<script type="module">
  import { initializeApp } from "firebase/app";
  import { getAuth, onAuthStateChanged, setPersistence, browserLocalPersistence } from "firebase/auth";
  import firebaseConfig from "./firebase-config.js";
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  setPersistence(auth, browserLocalPersistence);
  const percentEl = document.getElementById('loadingPercent');
  const fillBar = document.getElementById('progressFill');
  let progressValue = 0;
  let animationInterval = null;
  let authStateResolved = false;
  let targetRedirectUrl = null;
  let redirectTriggered = false;
  const TOTAL_DURATION = 2200;
  const STEP_MS = 16;
  const TOTAL_STEPS = TOTAL_DURATION / STEP_MS;
  let currentStep = 0;
  function updateProgress(percent) {
    const clamped = Math.min(100, Math.max(0, percent));
    percentEl.innerText = `${Math.floor(clamped)}%`;
    fillBar.style.width = `${clamped}%`;
  }
  function startLoadingAnimation() {
    if (animationInterval) clearInterval(animationInterval);
    currentStep = 0;
    updateProgress(0);
    animationInterval = setInterval(() => {
      if (redirectTriggered) return;
      currentStep++;
      let percent = (currentStep / TOTAL_STEPS) * 100;
      if (percent >= 100) {
        percent = 100;
        updateProgress(100);
        clearInterval(animationInterval);
        animationInterval = null;
        attemptRedirect();
      } else {
        updateProgress(percent);
      }
    }, STEP_MS);
  }
  function attemptRedirect() {
    if (redirectTriggered) return;
    const loadingFinished = (currentStep >= TOTAL_STEPS) || (progressValue >= 100);
    const authReady = authStateResolved;
    if (loadingFinished && authReady && targetRedirectUrl) {
      redirectTriggered = true;
      setTimeout(() => { window.location.href = targetRedirectUrl; }, 120);
    }
  }
  onAuthStateChanged(auth, (user) => {
    targetRedirectUrl = user ? 'dashboard.html' : 'login.html';
    authStateResolved = true;
    attemptRedirect();
  });
  window.addEventListener('DOMContentLoaded', () => { startLoadingAnimation(); });
  setTimeout(() => {
    if (!authStateResolved && !redirectTriggered) {
      authStateResolved = true;
      if (!targetRedirectUrl) targetRedirectUrl = 'login.html';
      attemptRedirect();
    }
  }, 4000);
</script>
</body>
<script type="module">
  import { auth } from "./js/firebase/firebase-config.js";

  console.log("Firebase Connected");
</script>
      </html>
