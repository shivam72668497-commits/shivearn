<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ShivearnApp - Login</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      background: linear-gradient(135deg,#0f172a,#1e293b);
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:20px;
    }

    .card{
      background:#fff;
      width:100%;
      max-width:400px;
      border-radius:25px;
      padding:30px;
      box-shadow:0 10px 30px rgba(0,0,0,.2);
    }

    .logo{
      text-align:center;
      margin-bottom:20px;
    }

    .logo h1{
      color:#0f172a;
      font-size:30px;
    }

    .logo p{
      color:#666;
      margin-top:5px;
      font-size:14px;
    }

    .input-group{
      margin-bottom:15px;
    }

    .input-group label{
      display:block;
      margin-bottom:6px;
      font-size:14px;
      font-weight:bold;
      color:#333;
    }

    .input-group input{
      width:100%;
      padding:14px;
      border:1px solid #ddd;
      border-radius:12px;
      outline:none;
      font-size:15px;
    }

    .password-box{
      position:relative;
    }

    .toggle-password{
      position:absolute;
      right:15px;
      top:50%;
      transform:translateY(-50%);
      cursor:pointer;
      color:#555;
      font-size:14px;
    }

    .btn{
      width:100%;
      border:none;
      padding:15px;
      border-radius:12px;
      font-size:16px;
      cursor:pointer;
      transition:.3s;
      font-weight:bold;
    }

    .login-btn{
      background:#2563eb;
      color:white;
      margin-top:10px;
    }

    .login-btn:hover{
      background:#1d4ed8;
    }

    .google-btn{
      background:#fff;
      color:#333;
      border:1px solid #ddd;
      margin-top:12px;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
    }

    .google-btn img{
      width:20px;
    }

    .divider{
      text-align:center;
      margin:18px 0;
      color:#777;
      position:relative;
    }

    .divider::before,
    .divider::after{
      content:'';
      position:absolute;
      width:40%;
      height:1px;
      background:#ddd;
      top:50%;
    }

    .divider::before{
      left:0;
    }

    .divider::after{
      right:0;
    }

    .bottom-text{
      text-align:center;
      margin-top:20px;
      font-size:14px;
    }

    .bottom-text a{
      color:#2563eb;
      text-decoration:none;
      font-weight:bold;
    }

    .error{
      color:red;
      text-align:center;
      margin-top:10px;
      font-size:14px;
    }

    @media(max-width:480px){
      .card{
        padding:25px;
      }
    }
  </style>
</head>
<body>

<div class="card">

  <div class="logo">
    <h1>ShivearnApp</h1>
    <p>Login to continue</p>
  </div>

  <div class="input-group">
    <label>Email</label>
    <input type="email" id="email" placeholder="Enter Email">
  </div>

  <div class="input-group">
    <label>Password</label>

    <div class="password-box">
      <input type="password" id="password" placeholder="Enter Password">
      <span class="toggle-password" id="togglePass">
        Show
      </span>
    </div>
  </div>

  <button class="btn login-btn" id="loginBtn">
    Login
  </button>

  <div class="divider">OR</div>

  <button class="btn google-btn" id="googleLogin">
    <img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png">
    Continue with Google
  </button>

  <div class="error" id="error"></div>

  <div class="bottom-text">
    Don't have account?
    <a href="register.html">Register</a>
  </div>

</div>

<script type="module">

import { initializeApp }
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
  getAuth,
  signInWithEmailAndPassword,
  GoogleAuthProvider,
  signInWithPopup,
  onAuthStateChanged
}
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDYdTJdXbxZ4bUGW-wO1BRaszEUb2Q_BAg",
  authDomain: "shivearnapp.firebaseapp.com",
  databaseURL: "https://shivearnapp-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "shivearnapp",
  storageBucket: "shivearnapp.firebasestorage.app",
  messagingSenderId: "467728812929",
  appId: "1:467728812929:web:a73f12827309d9c09d7680"
};
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

const provider = new GoogleAuthProvider();

const email = document.getElementById("email");
const password = document.getElementById("password");
const loginBtn = document.getElementById("loginBtn");
const googleBtn = document.getElementById("googleLogin");
const error = document.getElementById("error");


// Auto Redirect
onAuthStateChanged(auth, (user)=>{
  if(user){
    window.location.href = "dashboard.html";
  }
});


// Email Login
loginBtn.addEventListener("click", async ()=>{

  error.innerText = "";

  const emailVal = email.value.trim();
  const passVal = password.value.trim();

  if(!emailVal || !passVal){
    error.innerText = "Please fill all fields";
    return;
  }

  loginBtn.innerText = "Logging in...";
  loginBtn.disabled = true;

  try{

    await signInWithEmailAndPassword(
      auth,
      emailVal,
      passVal
    );

    window.location.href = "dashboard.html";

  }catch(err){

    switch(err.code){

      case "auth/user-not-found":
        error.innerText = "User not found";
      break;

      case "auth/wrong-password":
        error.innerText = "Wrong password";
      break;

      case "auth/invalid-email":
        error.innerText = "Invalid email";
      break;

      default:
        error.innerText = err.message;
    }

  }

  loginBtn.innerText = "Login";
  loginBtn.disabled = false;

});


// Google Login
googleBtn.addEventListener("click", async ()=>{

  try{

    await signInWithPopup(
      auth,
      provider
    );

    window.location.href =
    "dashboard.html";

  }catch(err){
    error.innerText =
    err.message;
  }

});


// Show Password
document.getElementById(
"togglePass"
).addEventListener("click", ()=>{

  if(password.type === "password"){
    password.type = "text";
    togglePass.innerText = "Hide";
  }else{
    password.type = "password";
    togglePass.innerText = "Show";
  }

});

</script>

</body>
</html>
