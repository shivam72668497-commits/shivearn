<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>ShivearnApp Login</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:
linear-gradient(135deg,#0f172a,#1e293b);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.card{
background:#fff;
width:100%;
max-width:400px;
padding:30px;
border-radius:25px;
box-shadow:
0 10px 30px rgba(0,0,0,.2);
}

.logo{
text-align:center;
margin-bottom:25px;
}

.logo h1{
font-size:32px;
color:#0f172a;
}

.logo p{
font-size:14px;
color:#666;
margin-top:5px;
}

.input-group{
margin-bottom:15px;
}

label{
display:block;
margin-bottom:8px;
font-size:14px;
font-weight:bold;
color:#333;
}

input{
width:100%;
padding:14px;
border:1px solid #ddd;
border-radius:12px;
outline:none;
font-size:15px;
}

.password-box{
position:relative;
}

#togglePassword{
position:absolute;
right:15px;
top:50%;
transform:translateY(-50%);
cursor:pointer;
font-size:14px;
color:#2563eb;
}

.btn{
width:100%;
padding:15px;
border:none;
border-radius:12px;
font-size:16px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

.login-btn{
background:#2563eb;
color:white;
margin-top:10px;
}

.google-btn{
background:#fff;
border:1px solid #ddd;
margin-top:15px;
display:flex;
justify-content:center;
align-items:center;
gap:10px;
}

.google-btn img{
width:20px;
}

.divider{
text-align:center;
margin:20px 0;
position:relative;
color:#777;
}

.divider::before,
.divider::after{
content:'';
width:40%;
height:1px;
background:#ddd;
position:absolute;
top:50%;
}

.divider::before{
left:0;
}

.divider::after{
right:0;
}

.error{
text-align:center;
color:red;
margin-top:12px;
font-size:14px;
}

.bottom-text{
text-align:center;
margin-top:20px;
font-size:14px;
}

.bottom-text a{
color:#2563eb;
text-decoration:none;
font-weight:bold;
}

</style>
</head>
<body>

<div class="card">

<div class="logo">
<h1>ShivearnApp</h1>
<p>Login to continue</p>
</div>

<div class="input-group">
<label>Email</label>
<input
type="email"
id="email"
placeholder="Enter Email">
</div>

<div class="input-group">
<label>Password</label>

<div class="password-box">

<input
type="password"
id="password"
placeholder="Enter Password">

<span id="togglePassword">
Show
</span>

</div>
</div>

<button
class="btn login-btn"
id="loginBtn">
Login
</button>

<div class="divider">
OR
</div>

<button
class="btn google-btn"
id="googleLogin">

<img src="https://cdn-icons-png.flaticon.com/512/2991/2991148.png">

Continue with Google

</button>

<div
class="error"
id="error">
</div>

<div class="bottom-text">
Don't have account?
<a href="register.html">
Create Account
</a>
</div>

</div>


<script type="module">

import {
initializeApp
}
from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";

import {
getAuth,
signInWithEmailAndPassword,
GoogleAuthProvider,
signInWithRedirect,
getRedirectResult,
onAuthStateChanged
}
from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

import {
getDatabase,
ref,
get,
set
}
from
"https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";


// Firebase Config
const firebaseConfig = {

apiKey:
"AIzaSyDYdTJdXbxZ4bUGW-wO1BRaszEUb2Q_BAg",

authDomain:
"shivearnapp.firebaseapp.com",

databaseURL:
"https://shivearnapp-default-rtdb.asia-southeast1.firebasedatabase.app",

projectId:
"shivearnapp",

storageBucket:
"shivearnapp.firebasestorage.app",

messagingSenderId:
"467728812929",

appId:
"1:467728812929:web:a73f12827309d9c09d7680"

};


// Initialize
const app =
initializeApp(firebaseConfig);

const auth =
getAuth(app);

const db =
getDatabase(app);

const provider =
new GoogleAuthProvider();


// Elements
const email =
document.getElementById("email");

const password =
document.getElementById("password");

const loginBtn =
document.getElementById("loginBtn");

const googleLogin =
document.getElementById("googleLogin");

const error =
document.getElementById("error");


// Auto Redirect
onAuthStateChanged(
auth,
(user)=>{

if(user){

window.location.href =
"dashboard.html";

}

});


// Create User Profile
async function createProfile(user){

const userRef =
ref(
db,
"users/" + user.uid
);

const snapshot =
await get(userRef);

if(!snapshot.exists()){

await set(userRef,{

uid:user.uid,

name:
user.displayName || "",

email:
user.email || "",

photoURL:
user.photoURL || "",

balance:0,

coins:0,

totalEarned:0,

completedTasks:0,

withdrawTotal:0,

role:"user",

status:"active",

referCode:
user.uid.slice(0,6),

createdAt:
Date.now()

});

}

}


// Email Login
loginBtn.addEventListener(
"click",
async ()=>{

error.innerText = "";

const emailVal =
email.value.trim();

const passVal =
password.value.trim();

if(!emailVal ||
!passVal){

error.innerText =
"Fill all fields";

return;

}

try{

loginBtn.innerText =
"Logging in...";

const userCredential =
await signInWithEmailAndPassword(
auth,
emailVal,
passVal
);

await createProfile(
userCredential.user
);

window.location.href =
"dashboard.html";

}catch(err){

error.innerText =
err.message;

}

loginBtn.innerText =
"Login";

});


// Google Login
googleLogin.addEventListener(
"click",
async ()=>{

try{

await signInWithRedirect(
auth,
provider
);

}catch(err){

error.innerText =
err.message;

}

});


// Google Redirect Result
getRedirectResult(auth)

.then(async(result)=>{

if(result?.user){

await createProfile(
result.user
);

window.location.href =
"dashboard.html";

}

})

.catch((err)=>{

error.innerText =
err.message;

});


// Show Password
document
.getElementById(
"togglePassword"
)

.addEventListener(
"click",
()=>{

if(
password.type ===
"password"
){

password.type =
"text";

togglePassword.innerText =
"Hide";

}else{

password.type =
"password";

togglePassword.innerText =
"Show";

}

});

</script>

</body>
</html>
