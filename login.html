<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - ShivearnApp</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <style>
    :root{
      --bg1:#08111f;
      --bg2:#0f1a33;
      --card:rgba(11, 20, 38, .72);
      --card2:rgba(15, 26, 51, .88);
      --stroke:rgba(255,255,255,.09);
      --text:#eef4ff;
      --muted:#a7b4cc;
      --muted2:#7f8aa4;
      --green:#10b981;
      --green2:#059669;
      --blue:#3b82f6;
      --blue2:#2563eb;
      --red:#ef4444;
      --redbg:rgba(239,68,68,.12);
      --shadow:0 24px 80px rgba(0,0,0,.45);
      --radius:28px;
      --input:#091224;
      --inputStroke:#22304d;
    }

    *{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%}
    body{
      font-family:'Inter',sans-serif;
      color:var(--text);
      min-height:100vh;
      overflow-x:hidden;
      background:
        radial-gradient(circle at top left, rgba(59,130,246,.18), transparent 32%),
        radial-gradient(circle at top right, rgba(16,185,129,.16), transparent 28%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      display:grid;
      place-items:center;
      padding:18px;
    }

    .bg-orb{
      position:fixed;
      inset:auto;
      width:300px;height:300px;
      border-radius:50%;
      filter:blur(40px);
      opacity:.22;
      pointer-events:none;
      z-index:0;
      animation: float 8s ease-in-out infinite;
    }
    .orb1{top:-80px;left:-80px;background:#2563eb}
    .orb2{bottom:-90px;right:-70px;background:#10b981;animation-delay:-2s}
    @keyframes float{
      0%,100%{transform:translateY(0) translateX(0) scale(1)}
      50%{transform:translateY(18px) translateX(12px) scale(1.06)}
    }

    #global-loader{
      position:fixed; inset:0;
      background:linear-gradient(135deg, rgba(8,17,31,.96), rgba(15,26,51,.96));
      backdrop-filter:blur(16px);
      z-index:9999;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:14px;
      transition:opacity .25s ease, visibility .25s ease;
    }
    .loader-ring{
      width:56px;height:56px;border-radius:50%;
      border:4px solid rgba(255,255,255,.12);
      border-top-color:var(--green);
      border-right-color:var(--blue);
      animation:spin 1s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg)}}
    .loader-text{
      color:var(--muted);
      font-size:.92rem;
      letter-spacing:.2px;
      text-align:center;
      padding:0 20px;
    }

    .shell{
      width:100%;
      max-width:460px;
      position:relative;
      z-index:1;
    }

    .card{
      background:linear-gradient(180deg, rgba(16,24,42,.75), rgba(8,14,29,.72));
      border:1px solid var(--stroke);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      backdrop-filter:blur(18px);
      -webkit-backdrop-filter:blur(18px);
      overflow:hidden;
      position:relative;
    }

    .topbar{
      height:8px;
      background:linear-gradient(90deg, var(--green), var(--blue));
    }

    .content{
      padding:30px 24px 26px;
    }

    .brand{
      display:flex;
      flex-direction:column;
      align-items:center;
      text-align:center;
      gap:10px;
      margin-bottom:22px;
    }
    .logo-badge{
      width:66px;height:66px;border-radius:22px;
      display:grid;place-items:center;
      background:
        radial-gradient(circle at 30% 25%, rgba(255,255,255,.25), transparent 34%),
        linear-gradient(135deg, rgba(16,185,129,.95), rgba(59,130,246,.95));
      box-shadow:0 16px 34px rgba(16,185,129,.18), 0 16px 34px rgba(59,130,246,.14);
      border:1px solid rgba(255,255,255,.13);
    }
    .logo-badge i{font-size:1.7rem;color:white}
    .brand h1{
      font-size:1.55rem;
      line-height:1.1;
      font-weight:800;
      letter-spacing:.2px;
      background:linear-gradient(90deg,#ffffff,#8fd3ff,#8bffcf);
      -webkit-background-clip:text;
      -webkit-text-fill-color:transparent;
      background-clip:text;
    }
    .brand p{
      color:var(--muted);
      font-size:.95rem;
      line-height:1.45;
      max-width:320px;
    }

    .alert{
      display:none;
      align-items:flex-start;
      gap:10px;
      padding:12px 14px;
      border-radius:16px;
      margin-bottom:18px;
      border:1px solid rgba(239,68,68,.18);
      background:var(--redbg);
      color:#ffd5d5;
    }
    .alert i{margin-top:1px;color:#ff8e8e}
    .alert strong{display:block;font-size:.92rem;margin-bottom:2px}
    .alert span{font-size:.9rem;color:#ffdede;line-height:1.45}

    form{margin-top:6px}

    .field{margin-bottom:16px}
    .label-row{
      display:flex;
      align-items:center;
      justify-content:space-between;
      margin-bottom:8px;
      gap:10px;
    }
    label{
      font-size:.88rem;
      color:var(--muted);
      font-weight:600;
      letter-spacing:.1px;
    }

    .input-wrap{
      position:relative;
    }

    .input-wrap .icon-left{
      position:absolute;
      left:14px;
      top:50%;
      transform:translateY(-50%);
      color:var(--muted2);
      font-size:1rem;
      pointer-events:none;
    }

    .input{
      width:100%;
      height:54px;
      border-radius:16px;
      border:1px solid var(--inputStroke);
      background:linear-gradient(180deg, rgba(9,18,36,.92), rgba(7,14,28,.94));
      color:var(--text);
      outline:none;
      padding:0 46px 0 44px;
      font-size:.96rem;
      transition:border-color .2s ease, box-shadow .2s ease, transform .2s ease;
    }
    .input::placeholder{color:#7685a4}
    .input:focus{
      border-color:rgba(59,130,246,.82);
      box-shadow:0 0 0 4px rgba(59,130,246,.16);
    }

    .toggle{
      position:absolute;
      right:14px;
      top:50%;
      transform:translateY(-50%);
      color:var(--muted2);
      cursor:pointer;
      user-select:none;
      transition:color .2s ease, transform .2s ease;
    }
    .toggle:hover{color:var(--text);transform:translateY(-50%) scale(1.05)}

    .actions{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:12px;
      margin:12px 0 14px;
      color:var(--muted);
      font-size:.9rem;
    }

    .check{
      display:flex;
      align-items:center;
      gap:8px;
      user-select:none;
    }
    .check input{accent-color:var(--green)}
    .check span{color:var(--muted)}

    .link{
      color:#9cc7ff;
      text-decoration:none;
      font-weight:600;
    }
    .link:hover{text-decoration:underline}

    .btn{
      width:100%;
      height:54px;
      border:none;
      border-radius:16px;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      font-weight:700;
      font-size:.98rem;
      transition:transform .2s ease, filter .2s ease, opacity .2s ease, box-shadow .2s ease;
      user-select:none;
      position:relative;
      overflow:hidden;
    }
    .btn:active:not(:disabled){transform:translateY(1px)}
    .btn:disabled{
      opacity:.62;
      cursor:not-allowed;
    }

    .btn-primary{
      background:linear-gradient(135deg, var(--green), var(--green2));
      color:white;
      box-shadow:0 14px 28px rgba(16,185,129,.22);
    }
    .btn-primary:hover:not(:disabled){
      filter:brightness(1.03);
      box-shadow:0 16px 30px rgba(16,185,129,.26);
    }

    .divider{
      display:flex;
      align-items:center;
      gap:14px;
      margin:18px 0 16px;
      color:var(--muted2);
      font-size:.84rem;
    }
    .divider::before,.divider::after{
      content:"";
      height:1px;
      flex:1;
      background:linear-gradient(90deg, transparent, rgba(255,255,255,.12), transparent);
    }

    .btn-google{
      background:linear-gradient(180deg, rgba(255,255,255,.98), rgba(241,245,249,.98));
      color:#1e293b;
      box-shadow:0 14px 30px rgba(0,0,0,.16);
      border:1px solid rgba(255,255,255,.55);
    }
    .btn-google:hover:not(:disabled){
      filter:brightness(.985);
      box-shadow:0 16px 34px rgba(0,0,0,.2);
    }

    .btn-spinner{
      width:19px;height:19px;border-radius:50%;
      border:3px solid rgba(255,255,255,.26);
      border-top-color:currentColor;
      animation:spin .8s linear infinite;
      display:none;
      flex:0 0 auto;
    }
    .google-spinner{
      border-color:rgba(30,41,59,.18);
      border-top-color:#1e293b;
    }

    .bottom{
      margin-top:18px;
      text-align:center;
      color:var(--muted);
      font-size:.92rem;
      line-height:1.5;
    }
    .bottom a{color:#87d0ff;text-decoration:none;font-weight:700}
    .bottom a:hover{text-decoration:underline}

    .fineprint{
      margin-top:14px;
      text-align:center;
      color:#73829e;
      font-size:.8rem;
      line-height:1.45;
    }

    @media (max-width: 480px){
      body{padding:12px}
      .content{padding:24px 16px 20px}
      .brand h1{font-size:1.4rem}
      .brand p{font-size:.92rem}
      .input,.btn{height:52px;border-radius:14px}
      .card{border-radius:24px}
      .logo-badge{width:60px;height:60px;border-radius:20px}
    }

    @media (prefers-reduced-motion: reduce){
      *,*::before,*::after{animation:none!important;transition:none!important;scroll-behavior:auto!important}
    }
  </style>
</head>
<body>
  <div class="bg-orb orb1"></div>
  <div class="bg-orb orb2"></div>

  <div id="global-loader">
    <div class="loader-ring"></div>
    <div class="loader-text">Verifying authentication state...</div>
  </div>

  <main class="shell">
    <section class="card">
      <div class="topbar"></div>

      <div class="content">
        <div class="brand">
          <div class="logo-badge" aria-hidden="true">
            <i class="fa-solid fa-wallet"></i>
          </div>
          <h1>ShivearnApp</h1>
          <p>Sign in to continue to your dashboard and earnings panel.</p>
        </div>

        <div id="error-alert" class="alert" role="alert" aria-live="polite">
          <i class="fa-solid fa-circle-exclamation"></i>
          <div>
            <strong>Login error</strong>
            <span id="error-message">Something went wrong.</span>
          </div>
        </div>

        <form id="login-form" novalidate>
          <div class="field">
            <div class="label-row">
              <label for="email">Email Address</label>
            </div>
            <div class="input-wrap">
              <i class="fa-solid fa-envelope icon-left"></i>
              <input
                id="email"
                class="input"
                type="email"
                placeholder="name@example.com"
                autocomplete="email"
                required
              />
            </div>
          </div>

          <div class="field">
            <div class="label-row">
              <label for="password">Password</label>
            </div>
            <div class="input-wrap">
              <i class="fa-solid fa-lock icon-left"></i>
              <input
                id="password"
                class="input"
                type="password"
                placeholder="••••••••"
                autocomplete="current-password"
                required
              />
              <i id="toggle-password" class="fa-solid fa-eye toggle" title="Show password"></i>
            </div>
          </div>

          <div class="actions">
            <label class="check">
              <input id="remember-me" type="checkbox" checked />
              <span>Keep me signed in</span>
            </label>
            <a class="link" href="#" onclick="return false;">Forgot password?</a>
          </div>

          <button type="submit" id="btn-submit" class="btn btn-primary">
            <span class="btn-spinner" id="submit-spinner"></span>
            <span id="submit-text">Log In</span>
          </button>
        </form>

        <div class="divider">or</div>

        <button type="button" id="btn-google" class="btn btn-google">
          <span class="btn-spinner google-spinner" id="google-spinner"></span>
          <i class="fa-brands fa-google" id="google-icon" style="color:#ea4335;font-size:1.05rem"></i>
          <span>Continue with Google</span>
        </button>

        <div class="bottom">
          Don’t have an account? <a href="register.html">Create Account</a>
        </div>

        <div class="fineprint">
          Secure sign-in with Firebase Authentication and Realtime Database sync.
        </div>
      </div>
    </section>
  </main>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import {
      getAuth,
      setPersistence,
      browserLocalPersistence,
      signInWithEmailAndPassword,
      signInWithRedirect,
      getRedirectResult,
      GoogleAuthProvider,
      onAuthStateChanged
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
    import {
      getDatabase,
      ref,
      get,
      set,
      update
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDYdTJdXbxZ4bUGW-wO1BRaszEUb2Q_BAg",
      authDomain: "shivearnapp.web.com",
      databaseURL: "https://shivearnapp-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "shivearnapp",
      storageBucket: "shivearnapp.firebasestorage.app",
      messagingSenderId: "467728812929",
      appId: "1:467728812929:web:a73f12827309d9c09d7680",
      measurementId: "G-VNWL648MN6"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    const provider = new GoogleAuthProvider();
    provider.addScope("email");
    provider.addScope("profile");

    const globalLoader = document.getElementById("global-loader");
    const loginForm = document.getElementById("login-form");
    const emailInput = document.getElementById("email");
    const passwordInput = document.getElementById("password");
    const togglePassword = document.getElementById("toggle-password");
    const btnSubmit = document.getElementById("btn-submit");
    const submitSpinner = document.getElementById("submit-spinner");
    const submitText = document.getElementById("submit-text");
    const btnGoogle = document.getElementById("btn-google");
    const googleSpinner = document.getElementById("google-spinner");
    const googleIcon = document.getElementById("google-icon");
    const errorAlert = document.getElementById("error-alert");
    const errorMessage = document.getElementById("error-message");

    let redirecting = false;
    let authReady = false;

    function showLoader(text = "Verifying authentication state...") {
      globalLoader.querySelector(".loader-text").textContent = text;
      globalLoader.style.visibility = "visible";
      globalLoader.style.opacity = "1";
    }

    function hideLoader() {
      globalLoader.style.opacity = "0";
      globalLoader.style.visibility = "hidden";
    }

    function showError(message) {
      errorMessage.textContent = message;
      errorAlert.style.display = "flex";
    }

    function clearError() {
      errorAlert.style.display = "none";
    }

    function setLoading(isLoading, mode = "email") {
      btnSubmit.disabled = isLoading;
      btnGoogle.disabled = isLoading;

      if (isLoading) {
        clearError();
        if (mode === "email") {
          submitSpinner.style.display = "inline-block";
          submitText.textContent = "Logging in...";
        } else {
          googleSpinner.style.display = "inline-block";
          googleIcon.style.display = "none";
        }
      } else {
        submitSpinner.style.display = "none";
        submitText.textContent = "Log In";
        googleSpinner.style.display = "none";
        googleIcon.style.display = "inline-block";
      }
    }

    function authErrorMessage(code) {
      const map = {
        "auth/invalid-email": "Please enter a valid email address.",
        "auth/user-disabled": "This account has been disabled.",
        "auth/user-not-found": "Account not found. Please register first.",
        "auth/wrong-password": "Incorrect password.",
        "auth/invalid-credential": "Invalid credentials. Please check your details.",
        "auth/popup-closed-by-user": "Google sign-in was cancelled.",
        "auth/popup-blocked": "Popup blocked. Allow popups and try again.",
        "auth/cancelled-popup-request": "Sign-in cancelled.",
        "auth/network-request-failed": "Network issue. Check your internet connection.",
        "auth/too-many-requests": "Too many attempts. Try again later.",
        "auth/operation-not-allowed": "This sign-in method is not enabled in Firebase.",
      };
      return map[code] || "Login failed. Please try again.";
    }

    togglePassword.addEventListener("click", () => {
      const isHidden = passwordInput.type === "password";
      passwordInput.type = isHidden ? "text" : "password";
      togglePassword.classList.toggle("fa-eye", !isHidden);
      togglePassword.classList.toggle("fa-eye-slash", isHidden);
      togglePassword.title = isHidden ? "Hide password" : "Show password";
    });

    async function syncUserProfile(user) {
      if (!user || !user.uid) throw new Error("Invalid user session.");

      const userRef = ref(db, `users/${user.uid}`);
      const snapshot = await get(userRef);

      const payload = {
        uid: user.uid,
        name: user.displayName || "User",
        email: user.email || "",
        photoURL: user.photoURL || "",
        balance: 0,
        coins: 0,
        totalEarned: 0,
        completedTasks: 0,
        withdrawTotal: 0,
        role: "user",
        status: "active",
        referralCode: user.uid.slice(0, 6).toUpperCase(),
        lastLoginAt: new Date().toISOString()
      };

      if (!snapshot.exists()) {
        await set(userRef, {
          ...payload,
          createdAt: new Date().toISOString()
        });
      } else {
        await update(userRef, payload);
      }

      if (!redirecting) {
        redirecting = true;
        window.location.replace("dashboard.html");
      }
    }

    async function initAuth() {
      try {
        await setPersistence(auth, browserLocalPersistence);
      } catch (e) {
        console.warn("Persistence setup failed:", e);
      }

      try {
        await getRedirectResult(auth);
      } catch (err) {
        console.error("Redirect result error:", err);
        showError(authErrorMessage(err.code));
      }

      onAuthStateChanged(auth, async (user) => {
        authReady = true;

        if (user) {
          showLoader("Signing you in...");
          try {
            await syncUserProfile(user);
          } catch (err) {
            console.error("Profile sync error:", err);
            showError(err.message || "Database sync failed.");
            hideLoader();
            setLoading(false);
          }
        } else {
          hideLoader();
        }
      });
    }

    loginForm.addEventListener("submit", async (e) => {
      e.preventDefault();
      clearError();

      const email = emailInput.value.trim();
      const password = passwordInput.value;

      if (!email) {
        showError("Please enter your email.");
        return;
      }

      const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
      if (!emailPattern.test(email)) {
        showError("Enter a valid email address.");
        return;
      }

      if (!password || password.length < 6) {
        showError("Password must be at least 6 characters.");
        return;
      }

      setLoading(true, "email");

      try {
        await signInWithEmailAndPassword(auth, email, password);
      } catch (err) {
        console.error("Email login error:", err);
        showError(authErrorMessage(err.code));
        setLoading(false);
      }
    });

    btnGoogle.addEventListener("click", async () => {
      clearError();
      setLoading(true, "google");

      try {
        await signInWithRedirect(auth, provider);
      } catch (err) {
        console.error("Google login error:", err);
        showError(authErrorMessage(err.code));
        setLoading(false);
      }
    });

    document.addEventListener("visibilitychange", () => {
      if (!document.hidden && authReady) {
        const loaderVisible = globalLoader.style.visibility !== "hidden";
        if (!loaderVisible) return;
      }
    });

    initAuth();
  </script>
</body>
</html>
